broadcast:
  name: Broadcast
  description: >-
    Send a message on the channel (or DM) configured in the Hermes entry,
    passing through the byte-safe split engine. Intended for push notifications
    from Home Assistant automations, including scheduled ones.
  fields:
    config_entry_id:
      name: Hermes instance
      description: The Hermes config entry to send from.
      required: true
      selector:
        config_entry:
          integration: hermes
    message:
      name: Message
      description: Text to send (it will be split if it exceeds the byte limit).
      required: true
      example: "Alert: motion detected in the garden"
      selector:
        text:
          multiline: true

send_direct:
  name: Send direct (DM)
  description: >-
    Send a direct message to a single node, bypassing the entry's default
    channel.
  fields:
    config_entry_id:
      name: Hermes instance
      description: The Hermes config entry to use as the sending gateway.
      required: true
      selector:
        config_entry:
          integration: hermes
    node_id:
      name: Recipient node ID
      description: Node id of the Meshtastic node to DM.
      required: true
      example: 3771721320
      selector:
        number:
          mode: box
          min: 0
    message:
      name: Message
      description: Text to send (it will be split if it exceeds the byte limit).
      required: true
      selector:
        text:
          multiline: true
